# Nayoure — Cloudflare Pages configuration
# https://developers.cloudflare.com/pages/

name = "nayoure"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# ── Email binding for contact form ─────────────────────────────
# This lets the Pages Function at /api/contact send email via
# Cloudflare Email Routing using the send_email Workers binding.
#
# IMPORTANT: Also add this binding in the Cloudflare Pages dashboard:
#   Pages → nayoure → Settings → Functions → Email bindings
#   Variable name : CONTACT_EMAIL
#   Destination   : info@nayoure.com
#
# And set up Cloudflare Email Routing for nayoure.com:
#   Dashboard → Email → Email Routing → Enable
#   Add rule: contact@nayoure.com → your-personal@email.com
#   Add rule: info@nayoure.com    → your-personal@email.com

# Email binding (add via Cloudflare Pages dashboard):
#   Pages → nayoure → Settings → Functions → Email bindings
#   Variable name : CONTACT_EMAIL
#   Destination   : info@nayoure.com
